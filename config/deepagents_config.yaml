# DeepAgents Multi-Agent Collaboration Configuration

# Agent team composition
team:
  - id: "tool_agent"
    role: "tool_executor"
    priority: 1
    
  - id: "chat_agent"
    role: "conversational"
    priority: 2

# Collaboration settings
collaboration:
  mode: "round_robin"  # round_robin, parallel, hierarchical
  shared_memory: true
  message_passing: true
  
  # Handoff configuration
  handoff:
    enabled: true
    max_handoffs: 3
    allow_self_handoff: false

# Execution settings
execution:
  max_iterations: 10
  timeout_per_agent: 30
  timeout_total: 120
  
  # Error handling
  error_strategy: "retry_then_handoff"  # retry, skip, handoff, stop
  
# Logging
logging:
  level: "INFO"
  log_agent_actions: true
  log_messages: true
