# LLM Configuration
# 统一的LLM模型配置，支持多种Provider

# 默认Provider配置
default_provider: "minimax"

# Provider配置
providers:
  # MiniMax配置
  minimax:
    # 模型名称
    model: "minimax/MiniMax-M2.5"
    # API端点
    base_url: "https://api.minimaxi.com/anthropic/"
    # API Key环境变量名
    api_key_env: "MINIMAX_API_KEY"
    # 默认参数
    temperature: 0.7
    max_tokens: 1024
    timeout: 30
    # 自定义请求头（可选）
    default_headers:
      Content-Type: "application/json"

  # OpenAI配置（预留）
  openai:
    model: "gpt-4o"
    api_key_env: "OPENAI_API_KEY"
    base_url: "https://api.openai.com/v1"
    temperature: 0.7
    max_tokens: 1024
    timeout: 30

  # Anthropic配置（预留）
  anthropic:
    model: "claude-3-5-sonnet-20241022"
    api_key_env: "ANTHROPIC_API_KEY"
    base_url: "https://api.anthropic.com"
    temperature: 0.7
    max_tokens: 1024
    timeout: 30

  # Azure OpenAI配置（预留）
  azure_openai:
    model: "gpt-4o"
    api_key_env: "AZURE_OPENAI_API_KEY"
    base_url: "${AZURE_OPENAI_ENDPOINT}/openai/deployments/${AZURE_DEPLOYMENT_NAME}"
    api_version: "2024-02-01"
    temperature: 0.7
    max_tokens: 1024
    timeout: 30

# 全局默认参数（可被Provider覆盖）
defaults:
  temperature: 0.7
  max_tokens: 1024
  timeout: 30
  streaming: false

# 日志配置
logging:
  level: "INFO"
  log_requests: false
  log_responses: false
