# 应用服务配置
# 应用级别的服务配置和Agent默认设置

# 服务配置
service:
  # 服务主机地址
  host: "0.0.0.0"

  # 服务端口
  port: 8000

  # 请求超时时间（秒）
  timeout: 30

  # 日志级别：DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: "INFO"

# Agent默认配置
agent:
  # 默认使用的LLM Provider
  default_provider: "minimax"

  # 默认系统提示词
  system_prompt: "你是一个有用的AI助手"

  # Agent默认参数
  defaults:
    # 最大迭代次数
    max_iterations: 10

    # 单次响应超时（秒）
    timeout: 60

    # 是否启用流式响应
    streaming: false

    # 默认温度参数
    temperature: 0.7

  # 可用Agent类型
  agent_types:
    - "tool_agent"
    - "chat_agent"
    - "multi_agent"
